<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>家庭点餐 — 后台管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f5; color: #333; }

    header {
      background: #e74c3c;
      color: #fff;
      padding: 16px 24px;
      font-size: 20px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header span { font-size: 14px; font-weight: normal; opacity: 0.85; }

    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 2px solid #e74c3c;
    }
    .tab {
      padding: 12px 28px;
      cursor: pointer;
      font-size: 15px;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .tab.active { border-bottom-color: #e74c3c; color: #e74c3c; font-weight: bold; }
    .tab:hover:not(.active) { background: #fafafa; }

    .page { display: none; padding: 24px; }
    .page.active { display: block; }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card h3 { font-size: 16px; margin-bottom: 14px; color: #444; }

    .form-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 13px; color: #666; }
    .form-group input, .form-group select, .form-group textarea {
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: #e74c3c;
    }
    textarea { resize: vertical; min-height: 60px; }

    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #e74c3c; color: #fff; }
    .btn-success { background: #27ae60; color: #fff; }
    .btn-warning { background: #f39c12; color: #fff; }
    .btn-danger { background: #c0392b; color: #fff; }
    .btn-gray { background: #bbb; color: #fff; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #f8f8f8; padding: 10px 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #eee; }
    td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tr:hover td { background: #fafafa; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      background: #e8f4fd;
      color: #2980b9;
    }
    .price { color: #e74c3c; font-weight: bold; }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 20px;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #27ae60; }
    .toast.error { background: #c0392b; }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff;
      border-radius: 10px;
      padding: 24px;
      width: 420px;
      max-width: 95vw;
    }
    .modal h3 { margin-bottom: 16px; }
    .modal .form-group { margin-bottom: 12px; }
    .modal .form-group input,
    .modal .form-group select,
    .modal .form-group textarea { width: 100%; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }

    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
    .stat-item {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .stat-item .num { font-size: 32px; font-weight: bold; color: #e74c3c; }
    .stat-item .label { font-size: 13px; color: #999; margin-top: 4px; }

    .empty { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }

    @media (max-width: 600px) {
      .form-row { flex-direction: column; }
      .tab { padding: 10px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>

<header>
  🍽️ 家庭点餐后台管理
  <span>— 菜单 · 分类 · 订单</span>
  <a href="/admin/banners" style="margin-left: auto; background: rgba(255,255,255,0.2); color: #fff; padding: 8px 16px; border-radius: 4px; text-decoration: none; font-size: 14px;">🖼️ 轮播图管理</a>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('overview')">概览</div>
  <div class="tab" onclick="switchTab('dishes')">菜品管理</div>
  <div class="tab" onclick="switchTab('categories')">分类管理</div>
  <div class="tab" onclick="switchTab('orders')">订单管理</div>
</div>

<!-- 概览 -->
<div id="tab-overview" class="page active">
  <div class="stat-grid" id="stats-grid">
    <div class="stat-item"><div class="num" id="stat-dishes">-</div><div class="label">菜品总数</div></div>
    <div class="stat-item"><div class="num" id="stat-categories">-</div><div class="label">分类数</div></div>
    <div class="stat-item"><div class="num" id="stat-orders">-</div><div class="label">今日订单</div></div>
  </div>
</div>

<!-- 菜品管理 -->
<div id="tab-dishes" class="page">
  <div class="card">
    <h3>添加新菜品</h3>
    <div class="form-row">
      <div class="form-group">
        <label>菜品名称 *</label>
        <input id="dish-name" type="text" placeholder="例：红烧肉" style="width:160px" />
      </div>
      <div class="form-group">
        <label>价格（元）*</label>
        <input id="dish-price" type="number" placeholder="0.00" step="0.5" style="width:100px" />
      </div>
      <div class="form-group">
        <label>所属分类 *</label>
        <select id="dish-category" style="width:120px"></select>
      </div>
      <div class="form-group">
        <label>图片链接</label>
        <input id="dish-image" type="text" placeholder="留空则无图" style="width:200px" />
      </div>
      <div class="form-group">
        <label>描述</label>
        <input id="dish-desc" type="text" placeholder="简短描述" style="width:200px" />
      </div>
      <button class="btn btn-primary" onclick="addDish()">+ 添加菜品</button>
    </div>
  </div>

  <div class="card">
    <h3>菜品列表 <span id="dish-count" style="font-weight:normal;font-size:13px;color:#999"></span></h3>
    <div style="margin-bottom:12px; display:flex; gap:10px; align-items:center;">
      <label style="font-size:13px;color:#666">按分类筛选：</label>
      <select id="filter-category" onchange="loadDishes()" style="padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;">
        <option value="">全部分类</option>
      </select>
    </div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>菜品名</th>
          <th>价格</th>
          <th>分类</th>
          <th>描述</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="dish-table-body">
        <tr><td colspan="6" class="empty">加载中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 分类管理 -->
<div id="tab-categories" class="page">
  <div class="card">
    <h3>添加分类</h3>
    <div class="form-row">
      <div class="form-group">
        <label>分类名称 *</label>
        <input id="cat-name" type="text" placeholder="例：热菜" style="width:180px" />
      </div>
      <button class="btn btn-primary" onclick="addCategory()">+ 添加分类</button>
    </div>
  </div>

  <div class="card">
    <h3>分类列表</h3>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>分类名称</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="cat-table-body">
        <tr><td colspan="3" class="empty">加载中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 订单管理 -->
<div id="tab-orders" class="page">
  <div class="card">
    <h3>查询订单（按用户ID）</h3>
    <div class="form-row">
      <div class="form-group">
        <label>用户 ID</label>
        <input id="order-user-id" type="number" value="1" style="width:100px" />
      </div>
      <button class="btn btn-primary" onclick="loadOrders()">查询</button>
    </div>
  </div>

  <div class="card">
    <h3>订单列表</h3>
    <table>
      <thead>
        <tr>
          <th>订单ID</th>
          <th>总价</th>
          <th>状态</th>
          <th>下单时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="order-table-body">
        <tr><td colspan="5" class="empty">请先查询订单</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 编辑菜品弹窗 -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>编辑菜品</h3>
    <input type="hidden" id="edit-dish-id" />
    <div class="form-group">
      <label>菜品名称 *</label>
      <input id="edit-name" type="text" />
    </div>
    <div class="form-group">
      <label>价格（元）*</label>
      <input id="edit-price" type="number" step="0.5" />
    </div>
    <div class="form-group">
      <label>所属分类 *</label>
      <select id="edit-category"></select>
    </div>
    <div class="form-group">
      <label>图片链接</label>
      <input id="edit-image" type="text" />
    </div>
    <div class="form-group">
      <label>描述</label>
      <textarea id="edit-desc"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gray" onclick="closeEditModal()">取消</button>
      <button class="btn btn-success" onclick="saveDish()">保存修改</button>
    </div>
  </div>
</div>

<!-- Toast 通知 -->
<div class="toast" id="toast"></div>

<script>
  const API = '';  // 相对路径，与后端同域

  let categories = [];

  // ---- 工具函数 ----
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast show ${type}`;
    setTimeout(() => el.className = 'toast', 2500);
  }

  async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '请求失败');
    return data;
  }

  // ---- 标签页切换 ----
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      const names = ['overview','dishes','categories','orders'];
      t.classList.toggle('active', names[i] === name);
    });
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');

    if (name === 'dishes') { loadCategories(); loadDishes(); }
    if (name === 'categories') loadCategories();
    if (name === 'orders') { /* 等用户点查询 */ }
    if (name === 'overview') loadOverview();
  }

  // ---- 概览 ----
  async function loadOverview() {
    try {
      const [dishes, cats] = await Promise.all([
        api('GET', '/dishes'),
        api('GET', '/categories'),
      ]);
      document.getElementById('stat-dishes').textContent = dishes.length;
      document.getElementById('stat-categories').textContent = cats.length;
    } catch(e) {}
    document.getElementById('stat-orders').textContent = '—';
  }

  // ---- 分类 ----
  async function loadCategories() {
    categories = await api('GET', '/categories');

    // 填充选择框
    ['dish-category', 'edit-category', 'filter-category'].forEach(id => {
      const sel = document.getElementById(id);
      if (!sel) return;
      const isFilter = id === 'filter-category';
      sel.innerHTML = isFilter ? '<option value="">全部分类</option>' : '';
      categories.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name;
        sel.appendChild(opt);
      });
    });

    // 渲染表格
    const tbody = document.getElementById('cat-table-body');
    if (!tbody) return;
    if (!categories.length) {
      tbody.innerHTML = '<tr><td colspan="3" class="empty">暂无分类</td></tr>';
      return;
    }
    tbody.innerHTML = categories.map(c => `
      <tr>
        <td>${c.id}</td>
        <td>${c.name}</td>
        <td><button class="btn btn-danger" onclick="deleteCategory(${c.id}, '${c.name}')">删除</button></td>
      </tr>
    `).join('');
  }

  async function addCategory() {
    const name = document.getElementById('cat-name').value.trim();
    if (!name) { toast('请输入分类名称', 'error'); return; }
    try {
      await api('POST', '/categories', { name });
      document.getElementById('cat-name').value = '';
      toast('分类添加成功');
      loadCategories();
    } catch(e) { toast(e.message, 'error'); }
  }

  async function deleteCategory(id, name) {
    if (!confirm(`确定删除分类「${name}」？\n（该分类下的菜品不会被删除）`)) return;
    try {
      await api('DELETE', `/categories/${id}`);
      toast('分类已删除');
      loadCategories();
    } catch(e) { toast(e.message, 'error'); }
  }

  // ---- 菜品 ----
  async function loadDishes() {
    const catFilter = document.getElementById('filter-category')?.value;
    const url = catFilter ? `/dishes?category_id=${catFilter}` : '/dishes';
    let dishes;
    try {
      dishes = await api('GET', url);
    } catch(e) { toast(e.message, 'error'); return; }

    document.getElementById('dish-count').textContent = `共 ${dishes.length} 道菜`;

    const catMap = Object.fromEntries(categories.map(c => [c.id, c.name]));
    const tbody = document.getElementById('dish-table-body');
    if (!dishes.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">暂无菜品</td></tr>';
      return;
    }
    tbody.innerHTML = dishes.map(d => `
      <tr>
        <td>${d.id}</td>
        <td><strong>${d.name}</strong></td>
        <td class="price">¥${d.price.toFixed(1)}</td>
        <td><span class="badge">${catMap[d.category_id] || '未知'}</span></td>
        <td style="color:#888;font-size:13px">${d.description || '—'}</td>
        <td style="white-space:nowrap">
          <button class="btn btn-warning" style="margin-right:6px" onclick='openEdit(${JSON.stringify(d)})'>编辑</button>
          <button class="btn btn-danger" onclick="deleteDish(${d.id}, '${d.name}')">删除</button>
        </td>
      </tr>
    `).join('');
  }

  async function addDish() {
    const name = document.getElementById('dish-name').value.trim();
    const price = parseFloat(document.getElementById('dish-price').value);
    const category_id = parseInt(document.getElementById('dish-category').value);
    const image = document.getElementById('dish-image').value.trim();
    const description = document.getElementById('dish-desc').value.trim();

    if (!name) { toast('请填写菜品名称', 'error'); return; }
    if (isNaN(price) || price <= 0) { toast('请填写正确的价格', 'error'); return; }
    if (!category_id) { toast('请选择分类', 'error'); return; }

    try {
      await api('POST', '/dishes', { name, price, category_id, image, description });
      document.getElementById('dish-name').value = '';
      document.getElementById('dish-price').value = '';
      document.getElementById('dish-image').value = '';
      document.getElementById('dish-desc').value = '';
      toast(`「${name}」添加成功`);
      loadDishes();
    } catch(e) { toast(e.message, 'error'); }
  }

  function openEdit(dish) {
    document.getElementById('edit-dish-id').value = dish.id;
    document.getElementById('edit-name').value = dish.name;
    document.getElementById('edit-price').value = dish.price;
    document.getElementById('edit-image').value = dish.image || '';
    document.getElementById('edit-desc').value = dish.description || '';
    // 设置分类
    const sel = document.getElementById('edit-category');
    sel.value = dish.category_id;
    document.getElementById('edit-modal').classList.add('show');
  }

  function closeEditModal() {
    document.getElementById('edit-modal').classList.remove('show');
  }

  async function saveDish() {
    const id = document.getElementById('edit-dish-id').value;
    const name = document.getElementById('edit-name').value.trim();
    const price = parseFloat(document.getElementById('edit-price').value);
    const category_id = parseInt(document.getElementById('edit-category').value);
    const image = document.getElementById('edit-image').value.trim();
    const description = document.getElementById('edit-desc').value.trim();

    if (!name || isNaN(price) || !category_id) { toast('请填写完整信息', 'error'); return; }

    try {
      await api('PUT', `/dishes/${id}`, { name, price, category_id, image, description });
      toast('修改成功');
      closeEditModal();
      loadDishes();
    } catch(e) { toast(e.message, 'error'); }
  }

  async function deleteDish(id, name) {
    if (!confirm(`确定删除菜品「${name}」？`)) return;
    try {
      await api('DELETE', `/dishes/${id}`);
      toast(`「${name}」已删除`);
      loadDishes();
    } catch(e) { toast(e.message, 'error'); }
  }

  // ---- 订单 ----
  async function loadOrders() {
    const userId = document.getElementById('order-user-id').value;
    if (!userId) { toast('请输入用户ID', 'error'); return; }
    let orders;
    try {
      orders = await api('GET', `/orders?user_id=${userId}`);
    } catch(e) { toast(e.message, 'error'); return; }

    const tbody = document.getElementById('order-table-body');
    if (!orders.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">该用户暂无订单</td></tr>';
      return;
    }

    tbody.innerHTML = orders.map(o => `
      <tr>
        <td>#${o.id}</td>
        <td class="price">¥${o.total_price.toFixed(1)}</td>
        <td>
          <span style="padding:3px 10px;border-radius:12px;font-size:12px;
            background:${o.status === '已完成' ? '#e8f8ef' : '#fef3e2'};
            color:${o.status === '已完成' ? '#27ae60' : '#f39c12'}">
            ${o.status}
          </span>
        </td>
        <td style="font-size:13px;color:#888">${o.create_time.replace('T',' ').substring(0,16)}</td>
        <td>
          ${o.status !== '已完成' ? `<button class="btn btn-success" onclick="completeOrder(${o.id})">标为完成</button>` : '—'}
        </td>
      </tr>
    `).join('');
  }

  async function completeOrder(id) {
    try {
      await api('PUT', `/orders/${id}/complete`);
      toast('订单已标为完成');
      loadOrders();
    } catch(e) { toast(e.message, 'error'); }
  }

  // 点击遮罩关闭弹窗
  document.getElementById('edit-modal').addEventListener('click', function(e) {
    if (e.target === this) closeEditModal();
  });

  // 初始化
  loadOverview();
</script>
</body>
</html>
