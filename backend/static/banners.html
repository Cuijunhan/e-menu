<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>轮播图管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "PingFang SC", sans-serif; background: #f5f5f5; }

    header {
      background: #e74c3c;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 20px; }
    .back-btn {
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
    }
    .back-btn:hover { background: rgba(255,255,255,0.3); }

    .container { max-width: 1200px; margin: 24px auto; padding: 0 24px; }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card h3 { font-size: 16px; margin-bottom: 14px; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #555; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }

    .upload-area {
      border: 2px dashed #ddd;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-area:hover { border-color: #e74c3c; background: #fafafa; }
    .upload-area input[type="file"] { display: none; }

    .preview-img {
      max-width: 200px;
      max-height: 150px;
      margin-top: 12px;
      border-radius: 4px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .btn-primary { background: #e74c3c; color: #fff; }
    .btn-primary:hover { background: #c0392b; }
    .btn-danger { background: #c0392b; color: #fff; }
    .btn-danger:hover { background: #a93226; }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #f8f8f8; font-weight: 600; font-size: 14px; }
    td { font-size: 14px; }

    .banner-img { width: 120px; height: 80px; object-fit: cover; border-radius: 4px; }
    .actions { display: flex; gap: 8px; }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 20px;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #27ae60; }
    .toast.error { background: #c0392b; }
  </style>
</head>
<body>
  <header>
    <h1>🖼️ 轮播图管理</h1>
    <a href="/admin" class="back-btn">← 返回后台</a>
  </header>

  <div class="container">
    <!-- 添加轮播图 -->
    <div class="card">
      <h3>添加轮播图</h3>
      <form id="addForm">
        <div class="form-group">
          <label>图片来源 *</label>
          <select id="imageSource" onchange="toggleImageInput()">
            <option value="default">使用默认图</option>
            <option value="upload">上传自定义图</option>
          </select>
        </div>

        <div class="form-group" id="defaultImageGroup">
          <label>选择默认图 *</label>
          <select id="defaultImageSelect">
            <option value="/images/banner-cooking.png">默认图1 - 今天有没有好好吃饭</option>
            <option value="/images/banner-coffee.png">默认图2 - 来杯咖啡提提神</option>
            <option value="/images/banner-cocktail.png">默认图3 - 小酌怡情</option>
          </select>
        </div>

        <div class="form-group" id="uploadImageGroup" style="display:none;">
          <label>上传图片 *</label>
          <div class="upload-area" onclick="document.getElementById('imageInput').click()">
            <input type="file" id="imageInput" accept="image/*">
            <div id="uploadText">📁 点击选择图片</div>
            <img id="previewImg" class="preview-img" style="display:none;">
          </div>
        </div>

        <div class="form-group">
          <label>标题</label>
          <input type="text" id="titleInput" placeholder="轮播图标题（可选）">
        </div>

        <div class="form-group">
          <label>排序</label>
          <input type="number" id="sortInput" value="0" min="0">
        </div>

        <button type="submit" class="btn btn-primary">添加轮播图</button>
      </form>
    </div>

    <!-- 轮播图列表 -->
    <div class="card">
      <h3>轮播图列表</h3>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>图片</th>
            <th>标题</th>
            <th>排序</th>
            <th>类型</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="bannerList"></tbody>
      </table>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const API_BASE = 'http://192.168.1.172:8000';
    let uploadedImageUrl = '';

    // 切换图片输入方式
    function toggleImageInput() {
      const source = document.getElementById('imageSource').value;
      const defaultGroup = document.getElementById('defaultImageGroup');
      const uploadGroup = document.getElementById('uploadImageGroup');

      if (source === 'default') {
        defaultGroup.style.display = 'block';
        uploadGroup.style.display = 'none';
      } else {
        defaultGroup.style.display = 'none';
        uploadGroup.style.display = 'block';
      }
    }

    // 图片预览
    document.getElementById('imageInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      // 显示预览
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('previewImg').src = e.target.result;
        document.getElementById('previewImg').style.display = 'block';
        document.getElementById('uploadText').style.display = 'none';
      };
      reader.readAsDataURL(file);

      // 上传到服务器
      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch(`${API_BASE}/upload/image`, {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        uploadedImageUrl = data.url;
        showToast('图片上传成功', 'success');
      } catch (error) {
        showToast('图片上传失败', 'error');
      }
    });

    // 添加轮播图
    document.getElementById('addForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const source = document.getElementById('imageSource').value;
      let imageUrl = '';
      let isDefault = false;

      if (source === 'default') {
        imageUrl = document.getElementById('defaultImageSelect').value;
        isDefault = true;
      } else {
        if (!uploadedImageUrl) {
          showToast('请先上传图片', 'error');
          return;
        }
        imageUrl = uploadedImageUrl;
        isDefault = false;
      }

      const data = {
        image: imageUrl,
        title: document.getElementById('titleInput').value,
        sort_order: parseInt(document.getElementById('sortInput').value),
        is_active: true,
        is_default: isDefault
      };

      try {
        const res = await fetch(`${API_BASE}/banners`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (res.ok) {
          showToast('添加成功', 'success');
          document.getElementById('addForm').reset();
          document.getElementById('previewImg').style.display = 'none';
          document.getElementById('uploadText').style.display = 'block';
          uploadedImageUrl = '';
          loadBanners();
        } else {
          showToast('添加失败', 'error');
        }
      } catch (error) {
        showToast('网络错误', 'error');
      }
    });

    // 加载轮播图列表
    async function loadBanners() {
      try {
        const res = await fetch(`${API_BASE}/banners/all`);
        const data = await res.json();
        const list = document.getElementById('bannerList');

        list.innerHTML = data.data.map(b => `
          <tr>
            <td>${b.id}</td>
            <td><img src="${API_BASE}${b.image}" class="banner-img"></td>
            <td>${b.title || '-'}</td>
            <td>${b.sort_order}</td>
            <td>${b.is_default ? '🎨 默认图' : '📤 自定义'}</td>
            <td>${b.is_active ? '✅ 激活' : '❌ 禁用'}</td>
            <td class="actions">
              <button class="btn btn-danger" onclick="deleteBanner(${b.id})">删除</button>
            </td>
          </tr>
        `).join('');
      } catch (error) {
        showToast('加载失败', 'error');
      }
    }

    // 删除轮播图
    async function deleteBanner(id) {
      if (!confirm('确定删除这个轮播图吗？')) return;

      try {
        const res = await fetch(`${API_BASE}/banners/${id}`, {
          method: 'DELETE'
        });

        if (res.ok) {
          showToast('删除成功', 'success');
          loadBanners();
        } else {
          showToast('删除失败', 'error');
        }
      } catch (error) {
        showToast('网络错误', 'error');
      }
    }

    // 提示消息
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // 初始加载
    loadBanners();
  </script>
</body>
</html>
